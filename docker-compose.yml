services:
  opengauss:
    image: opengauss/opengauss-server:latest
    container_name: opengauss-iceberg-fdw
    privileged: true
    ports:
      - "15432:5432"
    environment:
      GS_PASSWORD: "openGauss@123"
      TZ: "Asia/Shanghai"
      ICEBERG_RUST_BRIDGE_SO: "/usr/local/opengauss/lib/postgresql/libiceberg_rust_bridge.so"
      ICEBERG_WAREHOUSE: "file:///var/lib/opengauss/data/tmp/iceberg_fdw_regress"
    volumes:
      - ./docker-data/opengauss:/var/lib/opengauss
    mem_limit: 2g
    memswap_limit: 2g
    restart: unless-stopped
