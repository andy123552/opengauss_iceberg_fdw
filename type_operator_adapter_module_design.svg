  <text
     class="small"
     x="315.03574"
     y="919.70312"
     id="text78"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft YaHei', 'Noto Sans CJK SC', Arial, sans-serif">local recheck by original openGauss qual</text>
  <rect
     class="band"
     x="60"
     y="1100"
     width="1680"
     height="155"
     id="rect78" />
  <text
     class="note-title"
     x="85"
     y="1130"
     id="text79">predicate 与 recheck 标准</text>
  <text
     class="note"
     x="85"
     y="1158"
     id="text80">强下推：类型、操作符、常量编码、collation/比较语义均能证明与 openGauss 等价；例如安全整数映射、白名单比较、IS NULL。</text>
  <text
     class="note"
     x="85"
     y="1184"
     id="text81">候选下推 + recheck：能缩小扫描范围但语义可能不完全等价；例如 bpchar 等值、默认 varchar/string、非二进制 collation、近似向量结果。</text>
  <text
     class="note"
