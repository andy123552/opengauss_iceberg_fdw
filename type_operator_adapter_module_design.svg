     id="text5">type_adapter / operator_adapter 模块关系设计图</text>
  <text
     class="subtitle"
     x="80"
     y="90"
     id="text6">入口分为 openGauss 调用层与 FDW hook 入口层；当前图仅描述普通全表扫描，并保留 delta scan 替换分支。</text>
