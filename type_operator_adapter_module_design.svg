  <text
     class="box-title"
     x="485"
     y="554"
     id="text25">type_adapter</text>
  <text
     class="box-sub"
     x="485"
     y="582"
     id="text26">重点：openGauss 与 Iceberg 类型/值转换</text>
  <text
     class="small"
     x="485"
     y="610"
     id="text27">1. TupleDesc + catalog schema → field_id 映射</text>
  <text
     class="small"
     x="485"
     y="636"
     id="text28">2. Datum 常量 / Param → Iceberg predicate value</text>
  <text
     class="small"
     x="485"
     y="662"
     id="text29">3. Arrow schema 校验；Arrow batch → Datum</text>
  <text
     class="small"
     x="485"
     y="688"
     id="text30">4. 产生 exact / recheck / reject 类型策略</text>
  <line
     x1="485"
     y1="710"
     x2="855"
     y2="710"
     stroke="#fdba74"
     stroke-width="1"
     id="line30" />
  <text
     class="code"
     x="485"
     y="735"
     id="text31">int2/int4/int8 ↔ Iceberg int/long</text>
  <text
     class="code"
     x="485"
     y="758"
     id="text32">char/varchar ↔ string；vector(n) ↔ list&lt;float&gt;</text>
  <rect
     class="focus"
     x="935.62946"
     y="508.1116"
     width="430"
     height="270"
     id="rect32" />
  <text
     class="box-title"
     x="960"
     y="554"
     id="text33">operator_adapter</text>
  <text
     class="box-sub"
     x="960"
     y="582"
     id="text34">重点：表达式识别、predicate 标准化、recheck</text>
  <text
     class="small"
     x="960"
     y="610"
     id="text35">1. 识别 OpExpr / NullTest / vector ORDER BY + LIMIT</text>
  <text
     class="small"
     x="960"
     y="636"
     id="text36">2. 标准 predicate：field_id + op + encoded_value</text>
  <text
     class="small"
     x="960"
     y="662"
     id="text37">3. SDK 只接收 Iceberg expression，不接收 OG OID/Expr</text>
  <text
     class="small"
     x="960"
     y="688"
     id="text38">4. 划分 remote predicate 与 local recheck qual</text>
  <line
     x1="952.25946"
     y1="708.59265"
     x2="1322.2595"
     y2="708.59265"
     stroke="#fdba74"
     stroke-width="1"
     id="line38" />
