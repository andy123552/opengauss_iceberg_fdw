  <text
     class="small"
     x="526.73999"
     y="881.51843"
     id="text76"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft YaHei', 'Noto Sans CJK SC', Arial, sans-serif">Arrow batch → type_adapter</text>
